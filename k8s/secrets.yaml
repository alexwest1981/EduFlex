apiVersion: v1
kind: Secret
metadata:
  name: eduflex-secrets
  namespace: eduflex
type: Opaque
stringData:
  # Database
  POSTGRES_PASSWORD: "REPLACE_WITH_BASE64_PASSWORD"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_WITH_BASE64_PASSWORD"
  
  # JWT
  JWT_SECRET: "REPLACE_WITH_SECURE_JWT_SECRET"
  
  # MinIO
  MINIO_ROOT_USER: "admin"
  MINIO_ROOT_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  MINIO_ACCESS_KEY: "admin"
  MINIO_SECRET_KEY: "REPLACE_WITH_SECURE_PASSWORD"
  
  # Keycloak
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  KC_DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
