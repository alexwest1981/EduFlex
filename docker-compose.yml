services:
  # --- DATABASE (PostgreSQL) ---
  db:
    image: postgres:15-alpine
    container_name: eduflex-db
    restart: always
    environment:
      - POSTGRES_DB=eduflex
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gotland81} # Samma lösenord som du är van vid
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  # --- CACHE (Redis) ---
  redis:
    image: redis:alpine
    container_name: eduflex-redis
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  #   # --- MESSAGE BROKER (Kafka) ---
  #   zookeeper:
  #     image: confluentinc/cp-zookeeper:7.5.0
  #     container_name: eduflex-zookeeper
  #     environment:
  #       ZOOKEEPER_CLIENT_PORT: 2181
  #       ZOOKEEPER_TICK_TIME: 2000
  #     networks:
  #       - eduflex-net
  #
  #   kafka:
  #     image: confluentinc/cp-kafka:7.5.0
  #     container_name: eduflex-kafka
  #     ports:
  #       - "9092:9092"
  #     environment:
  #       KAFKA_BROKER_ID: 1
  #       KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
  #       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
  #       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:9094
  #       KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  #       KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #       KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
  #       KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
  #       KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  #     depends_on:
  #       - zookeeper
  #     networks:
  #       - eduflex-net
  #

  # --- OBJECT STORAGE (MinIO) ---
  minio:
    image: minio/minio
    container_name: eduflex-minio
    ports:
      - "9009:9000"
      - "9000:9000"
      - "9099:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    deploy:
      resources:
        limits:
          memory: 384M

  # --- IDENTITY PROVIDER (Keycloak) ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: eduflex-keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/eduflex
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:-gotland81}
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME=auth.eduflexlms.se
      - KC_HOSTNAME_PORT=443
      - KC_HTTP_ENABLED=true
      - KC_PROXY=edge
      - KC_HEALTH_ENABLED=true
      - JAVA_OPTS=-Xms512m -Xmx1024m
    ports:
      - "8189:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET /health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep \"HTTP/1.1 200 OK\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1536M
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  # --- BACKEND (Spring Boot) ---
  backend:
    build: ./eduflex
    container_name: eduflex-backend
    restart: on-failure:5
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/eduflex_backend
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-gotland81}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=eduflex-storage
      - ONLYOFFICE_INTERNAL_URL=http://eduflex-onlyoffice
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://auth.eduflexlms.se/realms/eduflex
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/eduflex/protocol/openid-connect/certs
      - KEYCLOAK_AUTH_SERVER_URL=https://auth.eduflexlms.se
      - KEYCLOAK_REALM=eduflex
      - KEYCLOAK_CLIENT_ID=eduflex-app
      - AI_SERVICE_URL=http://eduflex-ai:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-S0raknJQXb1gcrvpgkNlpRQW3OyfiR9Q}
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - EDUFLEX_LICENSE_PATH=/app/eduflex.license
      - EDUFLEX_FRONTEND_PATH=/frontend/src
    volumes:
      - ./uploads:/app/uploads
      - ./eduflex.license:/app/eduflex.license
      - ./backups:/app/backups
      - ./frontend/src:/frontend/src
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  # --- VIDEO MICROSERVICE ---
  eduflex-video:
    build: ./eduflex-video
    container_name: eduflex-video
    depends_on:
      - redis
      - backend
    environment:
      - REDIS_HOST=redis
      - CORE_URL=http://backend:8080
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=eduflex-storage
      # Direktlänk-URL för media (kringgår backend-proxy som Cloudflare blockerar)
      - MINIO_PUBLIC_URL=https://storage.eduflexlms.se
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8083:8081"
    volumes:
      - ./uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
    restart: always

  # --- PDF MICROSERVICE ---
  eduflex-pdf:
    build: ./eduflex-pdf
    container_name: eduflex-pdf
    depends_on:
      - redis
      - backend
    environment:
      - REDIS_HOST=redis
      - CORE_URL=http://backend:8080
      - MINIO_URL=http://minio:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    volumes:
      - ./uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  # --- SCORM & xAPI MICROSERVICE ---
  eduflex-scorm:
    build: ./eduflex-scorm
    container_name: eduflex-scorm
    depends_on:
      - redis
      - backend
    environment:
      - SERVER_PORT=8082
      - REDIS_HOST=redis
      - CORE_URL=http://backend:8080
      - DATABASE_URL=jdbc:postgresql://db:5432/eduflex_scorm
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-gotland81}
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=eduflex-storage
      - MINIO_PUBLIC_URL=https://storage.eduflexlms.se
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8084:8082"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
    restart: always

  # --- NOTIFICATIONS MICROSERVICE ---
  eduflex-notifications:
    build: ./eduflex-notifications
    container_name: eduflex-notifications
    depends_on:
      - redis
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
      - REDIS_HOST=redis
      - EDUFLEX_JWT_SECRET=${EDUFLEX_JWT_SECRET:-eduflex_secure_secret_key_32_chars_}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    restart: always

  # --- AI MICROSERVICE ---
  eduflex-ai:
    build: ./eduflex-ai
    container_name: eduflex-ai
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-2.0-flash
      - PORT=8000
    ports:
      - "8008:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    restart: always

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: eduflex-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_BACKEND_URL=http://backend:8080
      - VITE_NOTIFICATIONS_URL=http://eduflex-notifications:8085
    command: npm run dev -- --host --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  #   # --- MEDIA SERVICE (Microservice) ---
  #   media-service:
  #     build: ./eduflex-media-service
  #     container_name: eduflex-media-service
  #     ports:
  #       - "8082:8082"
  #     environment:
  #       # - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9094
  #     # depends_on:
  #
  #     #   - kafka
  #     networks:
  #       - eduflex-net

  # --- MONITORING (Prometheus & Grafana) ---
  prometheus:
    image: prom/prometheus
    container_name: eduflex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  grafana:
    image: grafana/grafana
    container_name: eduflex-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  # --- DOCUMENT EDITING (ONLYOFFICE) ---
  onlyoffice-ds:
    image: onlyoffice/documentserver:latest
    container_name: eduflex-onlyoffice
    restart: always
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-S0raknJQXb1gcrvpgkNlpRQW3OyfiR9Q}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
      # Enable debug logging
      - DS_LOG_LEVEL=DEBUG
      # Proxy and base URL configuration to fix localhost:8081 redirection and SSL issues
      - DS_ADDRESS=https://www.eduflexlms.se
      - DS_QUERY_ADDRESS=https://www.eduflexlms.se
      - DS_HEADER_X_FORWARDED_PROTO=X-Forwarded-Proto
      - DS_HEADER_X_FORWARDED_HOST=X-Forwarded-Host
      - DS_HEADER_X_FORWARDED_PORT=X-Forwarded-Port
      - DS_USE_HTTP_FOR_INTERNAL_CALLS=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    ports:
      - "8081:80"
      - "8445:443"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- LIVE VIDEO LESSONS (LiveKit) ---
  livekit:
    image: livekit/livekit-server:latest
    container_name: eduflex-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  # --- BACKUPS ---
  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: eduflex-backup
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=eduflex
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gotland81}
      - POSTGRES_EXTRA_OPTS=-Z9 --schema=public --blobs
      - SCHEDULE=0 0,12 * * *
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=80
    volumes:
      - ./backups:/backups
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net

  # --- CLOUDFLARE TUNNEL ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: eduflex-cloudflared
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared_config.yml:/etc/cloudflared/config.yml
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eduflex-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "frontend:172.17.0.1"
      - "backend:172.17.0.1"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  livekit_data:


networks:
  eduflex-net:
    driver: bridge
